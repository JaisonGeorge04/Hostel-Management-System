{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="panel">
        <h2 class="text-center mb-3">Log In</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="form-error">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-primary btn-block mt-2">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
